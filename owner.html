<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Owner Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">
            Order2Me - Owner
        </span>
    </div>
</nav>

<div class="container py-5">

    <!-- Add Food Button -->
    <div class="mb-4">
        <button class="btn btn-success btn-lg" data-bs-toggle="modal" data-bs-target="#addFoodModal">
            <i class="bi bi-plus-circle"></i> Add Food
        </button>
    </div>

    <!-- Menu Items Table -->
    <div class="card">
        <div class="card-body">
            <h3>Menu Items</h3>
            <div id="menu-list" class="mt-4">
                <p class="text-muted">Loading menu...</p>
            </div>
        </div>
    </div>

</div>

<!-- Add Food Modal -->
<div class="modal fade" id="addFoodModal" tabindex="-1" aria-labelledby="addFoodLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addFoodLabel">Add New Food</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="menu-form">
                    <input type="hidden" id="item-id">
                    
                    <div class="mb-3">
                        <label for="item-name" class="form-label">Food Name</label>
                        <input type="text" class="form-control" id="item-name" required>
                    </div>

                    <div class="mb-3">
                        <label for="item-description" class="form-label">Description</label>
                        <input type="text" class="form-control" id="item-description">
                    </div>

                    <div class="mb-3">
                        <label for="item-price" class="form-label">Price (MMK)</label>
                        <input type="number" class="form-control" id="item-price" required min="0" step="100">
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="item-available" checked>
                        <label class="form-check-label" for="item-available">Available</label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="submit-btn">Add Food</button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Food Modal -->
<div class="modal fade" id="editFoodModal" tabindex="-1" aria-labelledby="editFoodLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editFoodLabel">Edit Food</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="edit-form">
                    <input type="hidden" id="edit-item-id">
                    
                    <div class="mb-3">
                        <label for="edit-item-name" class="form-label">Food Name</label>
                        <input type="text" class="form-control" id="edit-item-name" required>
                    </div>

                    <div class="mb-3">
                        <label for="edit-item-description" class="form-label">Description</label>
                        <input type="text" class="form-control" id="edit-item-description">
                    </div>

                    <div class="mb-3">
                        <label for="edit-item-price" class="form-label">Price (MMK)</label>
                        <input type="number" class="form-control" id="edit-item-price" required min="0" step="100">
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="edit-item-available" checked>
                        <label class="form-check-label" for="edit-item-available">Available</label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="edit-submit-btn">Update Food</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/owner.js"></script>

</body>
</html>
